services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paix
      POSTGRES_USER: paix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6380:6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://paix:${POSTGRES_PASSWORD:-paix}@postgres:5432/paix
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000/api/v1
    depends_on:
      - api

  celery-worker:
    build: ./api
    command: celery -A celery_app worker --loglevel=info --concurrency=2 -Q default,proactive,memory
    environment:
      DATABASE_URL: postgresql+asyncpg://paix:${POSTGRES_PASSWORD:-paix}@postgres:5432/paix
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy

  celery-beat:
    build: ./api
    command: celery -A celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://paix:${POSTGRES_PASSWORD:-paix}@postgres:5432/paix
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  falkordb_data:
